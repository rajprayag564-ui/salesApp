name: Build and publish Expo app (EAS)

on:
  push:
    branches:
      - feature/offline-queue-archive-mobile
  workflow_dispatch:

jobs:
  eas-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install EAS CLI
        run: npm install -g eas-cli
      - name: Install app dependencies
        run: |
          cd field-agent-app
          npm ci
      - name: Configure EAS token
        env:
          EAS_BUILD_AUTOMATED: '1'
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: echo "EAS token configured"
      - name: Start EAS build (Android)
        env:
          EAS_TOKEN: ${{ secrets.EAS_TOKEN }}
        run: |
          cd field-agent-app
          eas build -p android --non-interactive --clear-cache
